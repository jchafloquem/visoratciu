<div class="legend-panel" *ngIf="hasVisibleLegends()">
  <h4>Leyenda</h4>
  <div *ngFor="let layer of layers" class="legend-item">
    <div *ngIf="layer.getVisible() && getLegendUrl(layer)">
      <div class="legend-image">
        <img [src]="getLegendUrl(layer)" [alt]="'Leyenda de ' + layer.get('title')">
      </div>
    </div>
  </div>
</div>
